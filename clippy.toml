# Rust Linter Configuration
# Phenotype Standard - Do not modify directly
# Inherit from phenotype-governance/configs/rust/

msrv = "1.75.0"

# Pedantic lints for high quality code
cognitive-complexity-threshold = 15
too-many-arguments-threshold = 6
type-complexity-threshold = 500
too-many-lines-threshold = 500

# Disallowed identifiers in the codebase
disallowed-names = ["foo", "bar", "baz", "quux", "toto", "tata"]

# Prefer explicit wildcard imports
warn-on-all-wildcard-imports = true
